<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AI Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{background:#070708;color:#E8E8E8;font-family:'JetBrains Mono','IBM Plex Mono',monospace}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-track{background:#070708}
    ::-webkit-scrollbar-thumb{background:#1a1a1f;border-radius:1px}
    ::-webkit-scrollbar-thumb:hover{background:#2a2a2a}
    :focus-visible{outline:1px solid #00F5FF;outline-offset:2px}
    ::selection{background:rgba(0,245,255,0.15);color:#E8E8E8}
    a{color:inherit;text-decoration:none}
    a:hover{color:#00F5FF}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes radarSweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .radar-spin{animation:radarSweep 3s linear infinite;transform-origin:center}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/archive/archive.jsx"></script>
</body>
</html>
