<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background square, sharp corners per design system -->
  <rect width="128" height="128" fill="#0A0A0A"/>

  <!-- Outer radar ring -->
  <circle cx="64" cy="64" r="52" stroke="#00F5FF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- Mid radar ring -->
  <circle cx="64" cy="64" r="36" stroke="#00F5FF" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>

  <!-- Inner radar ring -->
  <circle cx="64" cy="64" r="20" stroke="#00F5FF" stroke-width="1" opacity="0.7"/>

  <!-- Radar sweep arc (one quadrant lit) -->
  <path
    d="M64 64 L64 28 A36 36 0 0 1 100 64 Z"
    fill="#00F5FF"
    opacity="0.08"
  />
  <path
    d="M64 64 L64 28 A36 36 0 0 1 100 64 Z"
    stroke="#00F5FF"
    stroke-width="1"
    fill="none"
    opacity="0.4"
  />

  <!-- Sweep arm line -->
  <line x1="64" y1="64" x2="64" y2="12" stroke="#00F5FF" stroke-width="1.5" opacity="0.9"/>

  <!-- Crosshair lines -->
  <line x1="12" y1="64" x2="116" y2="64" stroke="#1E1E1E" stroke-width="1"/>
  <line x1="64" y1="12" x2="64" y2="116" stroke="#1E1E1E" stroke-width="1"/>

  <!-- Center dot — bright core -->
  <circle cx="64" cy="64" r="4" fill="#00F5FF"/>
  <circle cx="64" cy="64" r="2" fill="#ffffff"/>

  <!-- Blip 1 — top right quadrant, high signal -->
  <circle cx="87" cy="41" r="3.5" fill="#00FF88" opacity="0.95"/>
  <circle cx="87" cy="41" r="6" fill="#00FF88" opacity="0.2"/>

  <!-- Blip 2 — softer, further out -->
  <circle cx="96" cy="58" r="2.5" fill="#00F5FF" opacity="0.7"/>
  <circle cx="96" cy="58" r="5" fill="#00F5FF" opacity="0.1"/>

  <!-- Blip 3 — orange, a different source -->
  <circle cx="78" cy="32" r="2" fill="#FF6B00" opacity="0.8"/>

  <!-- "AI" text mark at top-left quadrant, sharp monospace feel -->
  <text
    x="18"
    y="26"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11"
    font-weight="700"
    fill="#00F5FF"
    letter-spacing="1"
  >AI</text>

  <!-- Bottom label -->
  <text
    x="64"
    y="118"
    font-family="'Space Grotesk', sans-serif"
    font-size="8"
    font-weight="600"
    fill="#444444"
    text-anchor="middle"
    letter-spacing="3"
  >RADAR</text>
</svg>
